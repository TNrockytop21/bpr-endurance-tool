<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quick Action</title>
  <style>
    body { background: #2d2d2d; color: #d8d8d8; font-family: -apple-system, sans-serif; font-size: 12px; padding: 12px; margin: 0; }
    .sdpi-item { display: flex; align-items: center; margin: 8px 0; }
    .sdpi-item-label { width: 80px; color: #9a9a9a; }
    select { background: #3b3b3b; border: 1px solid #555; color: #d8d8d8; padding: 6px 8px; border-radius: 4px; width: 200px; }
    h2 { font-size: 13px; color: #ccc; margin: 0 0 12px; border-bottom: 1px solid #444; padding-bottom: 8px; }
  </style>
</head>
<body>
  <h2>BPR - Quick Action</h2>

  <div class="sdpi-item">
    <div class="sdpi-item-label">Action</div>
    <select id="toggleAction">
      <option value="toggleGhost">Toggle Ghost Line</option>
      <option value="fullscreen">Toggle Fullscreen</option>
    </select>
  </div>

  <script>
    let websocket = null;
    let uuid = null;

    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      uuid = inUUID;
      websocket = new WebSocket('ws://127.0.0.1:' + inPort);
      websocket.onopen = function() {
        websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
        websocket.send(JSON.stringify({ event: 'getSettings', context: inUUID }));
      };
      websocket.onmessage = function(evt) {
        const msg = JSON.parse(evt.data);
        if (msg.event === 'didReceiveSettings' && msg.payload?.settings) {
          document.getElementById('toggleAction').value = msg.payload.settings.toggleAction || 'toggleGhost';
        }
      };
    }

    document.getElementById('toggleAction').addEventListener('change', function() {
      if (websocket) {
        websocket.send(JSON.stringify({
          event: 'setSettings',
          context: uuid,
          payload: { toggleAction: this.value }
        }));
      }
    });
  </script>
</body>
</html>
